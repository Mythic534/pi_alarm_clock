<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Clock</title>
  <style>
    /* ── 7-segment font ─────────────────────────────────────────────── */
    @font-face {
      font-family: 'DSEG7';
      src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: block;
    }

    /* ── Palette ─────────────────────────────────────────────────────── */
    :root {
      --cyan:        #00CCEE;
      --cyan-bright: #33DDFF;
      --cyan-mid:    #0099BB;
      --cyan-ghost:  #000D12;
      --cyan-dim:    #006677;
      --bg:          #000000;
      --alarm-bg:    #00080D;
      --rule:        #002030;
      --glow:        rgba(0, 204, 238, 0.35);
      --glow-s:      rgba(0, 204, 238, 0.20);
    }

    /* ── Reset ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: var(--bg);
      color: var(--cyan);
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Page structure ──────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      width: 1280px;
      height: 720px;
    }

    /* ── Clock face ──────────────────────────────────────────────────── */
    #clock-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding-bottom: 12px;
    }

    #dim-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    z-index: 100;
    }

    #dim-overlay.dimmed {
        opacity: 0.85;
        pointer-events: auto;
    }

    .time-wrapper {
      position: relative;
      display: inline-block;
      line-height: 1;
    }

    .time-ghost,
    .time-real {
      font-family: 'DSEG7', 'Courier New', monospace;
      white-space: nowrap;
    }

    .time-ghost {
      color: var(--cyan-ghost);
      font-size: 200px;
      letter-spacing: 3px;
    }

    .time-real {
      position: absolute;
      top: 0;
      left: 0;
      color: var(--cyan);
      font-size: 200px;
      letter-spacing: 3px;
      text-shadow:
        0 0 24px var(--glow),
        0 0 56px var(--glow-s);
    }

    .secs-ghost { font-size: 134px; color: var(--cyan-ghost); }
    .secs-real  { font-size: 134px; color: var(--cyan-mid);
                  text-shadow: 0 0 16px var(--glow-s); }

    .date-line {
      font-family: 'Courier New', 'Lucida Console', monospace;
      font-size: 28px;
      letter-spacing: 12px;
      color: var(--cyan-dim);
      text-transform: uppercase;
    }

    /* ── Horizontal rule ─────────────────────────────────────────────── */
    .h-rule {
      width: calc(100% - 90px);
      height: 1px;
      margin: 0 45px;
      background: var(--rule);
      flex-shrink: 0;
    }

    /* ── Alarm panel ─────────────────────────────────────────────────── */
    #alarm-section {
      flex-shrink: 0;
      height: 190px;
      background: var(--alarm-bg);
      display: flex;
      align-items: center;
      padding: 0 48px;
    }

    .panel-label {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 6px;
      color: var(--rule);
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      flex-shrink: 0;
      margin-right: 26px;
    }

    .v-rule {
      width: 1px;
      height: 106px;
      background: var(--rule);
      flex-shrink: 0;
      margin-right: 38px;
    }

    .alarm-body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .alarm-name {
      font-family: 'Courier New', monospace;
      font-size: 22px;
      letter-spacing: 6px;
      color: var(--cyan-dim);
      text-transform: uppercase;
    }

    .alarm-time-row {
      display: flex;
      align-items: baseline;
      gap: 28px;
    }

    .alarm-time-wrap { position: relative; display: inline-block; }

    .alarm-t-ghost,
    .alarm-t-real {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: 82px;
      line-height: 1;
      letter-spacing: 2px;
    }

    .alarm-t-ghost { color: var(--cyan-ghost); }

    .alarm-t-real {
      position: absolute;
      top: 0; left: 0;
      color: var(--cyan);
      text-shadow:
        0 0 14px var(--glow),
        0 0 32px var(--glow-s);
    }

    .alarm-meta {
      font-family: 'Courier New', monospace;
      font-size: 24px;
      letter-spacing: 5px;
      color: var(--cyan-dim);
      text-transform: uppercase;
    }

    .no-alarm {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 8px;
      color: var(--cyan-ghost);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Clock face ──────────────────────────────────────────────────── -->
  <section id="clock-section" aria-label="Current time">

    <div class="time-wrapper">
      <div class="time-ghost" aria-hidden="true">
        88:88<span class="secs-ghost">:88</span>
      </div>
      <div class="time-real" role="timer" aria-live="off">
        <span id="hhmm">--:--</span><span class="secs-real" id="secs">:--</span>
      </div>
    </div>

    <div class="date-line" id="date-line" aria-live="polite" aria-atomic="true">
      ---  ·  -- --- ----
    </div>

  </section>

  <div class="h-rule" role="separator"></div>

  <!-- ── Next alarm panel ────────────────────────────────────────────── -->
  <section id="alarm-section" aria-label="Next alarm">
    <div class="panel-label" aria-hidden="true">Next alarm</div>
    <div class="v-rule"      aria-hidden="true"></div>
    <div class="alarm-body"  id="alarm-body">
      <div class="no-alarm">No alarms scheduled</div>
    </div>
  </section>

</div>

<div id="dim-overlay" aria-hidden="true"></div>

<script>
  'use strict';

  const elHHMM  = document.getElementById('hhmm');
  const elSecs  = document.getElementById('secs');
  const elDate  = document.getElementById('date-line');
  const elAlarm = document.getElementById('alarm-body');

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderClock(data) {
    const t = data.time.split(':');
    elHHMM.textContent = t[0] + ':' + t[1];
    elSecs.textContent = ':' + t[2];
    elDate.textContent = data.day + '  ·  ' + data.date;

    if (data.alarm) {
      const a = data.alarm;
      elAlarm.innerHTML =
        '<div class="alarm-name">' + esc(a.name) + '</div>' +
        '<div class="alarm-time-row">' +
          '<div class="alarm-time-wrap">' +
            '<div class="alarm-t-ghost" aria-hidden="true">88:88</div>' +
            '<div class="alarm-t-real">' + esc(a.time) + '</div>' +
          '</div>' +
          '<div class="alarm-meta">' + esc(a.day) + '  ·  ' + esc(a.date) + '</div>' +
        '</div>';
    } else {
      elAlarm.innerHTML = '<div class="no-alarm">No alarms scheduled</div>';
    }
  }

  async function poll() {
    try {
      const r = await fetch('/api/status');
      if (r.ok) renderClock(await r.json());
    } catch (_) {}
    setTimeout(poll, 500);
  }

  poll();

  {% if auto_dim %}
  const DIM_AFTER_MS = {{ dim_after_seconds }} * 1000;
  const elOverlay = document.getElementById('dim-overlay');
  let dimTimer = null;
  let isDimmed = false;

  function resetDimTimer() {
    clearTimeout(dimTimer);
    dimTimer = setTimeout(dim, DIM_AFTER_MS);
  }

  function dim() {
    elOverlay.classList.add('dimmed');
    isDimmed = true;
    fetch('/api/dim', { method: 'POST' }).catch(() => {});
  }

  function wake() {
    if (isDimmed) {
      elOverlay.classList.remove('dimmed');
      isDimmed = false;
    }
    fetch('/api/wake', { method: 'POST' }).catch(() => {});
    resetDimTimer();
  }

  resetDimTimer();
  {% else %}
  function wake() {
    fetch('/api/wake', { method: 'POST' }).catch(() => {});
  }
  {% endif %}

  document.addEventListener('touchstart', wake, { passive: true });
  document.addEventListener('click', wake);

</script>
</body>
</html>
